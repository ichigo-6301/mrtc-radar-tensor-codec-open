<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="580" viewBox="0 0 1480 580" role="img" aria-labelledby="title desc">
  <title id="title">MRTC-RDTC end-to-end overview</title>
  <desc id="desc">OFDM sensing produces Range-Doppler blocks. Configurable lossless RDTC engines encode them into packet-atomic AXI streams, and the decoder reconstructs the original I and Q samples bit-exactly.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#0f172a}.subtitle{font:400 16px Arial,sans-serif;fill:#475569}.heading{font:700 18px Arial,sans-serif;fill:#0f172a}.body{font:400 14px Arial,sans-serif;fill:#334155}.tiny{font:400 12px Arial,sans-serif;fill:#475569}.box{stroke:#334155;stroke-width:2}.flow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1480" height="580" fill="#f8fafc"/>
  <text x="48" y="48" class="title">MRTC-RDTC: sensing tensor to bit-exact reconstruction</text>
  <text x="48" y="78" class="subtitle">Lossless block coding, scalable engines, packet-atomic output, and evidence-backed implementation results.</text>

  <rect x="45" y="145" width="170" height="230" rx="6" class="box" fill="#dbeafe"/>
  <text x="130" y="182" text-anchor="middle" class="heading">OFDM sensing</text>
  <path d="M82 257 Q130 190 178 257" stroke="#2563eb" stroke-width="4" fill="none"/>
  <path d="M97 257 Q130 213 163 257" stroke="#2563eb" stroke-width="4" fill="none"/>
  <circle cx="130" cy="257" r="8" fill="#2563eb"/>
  <text x="130" y="310" text-anchor="middle" class="body">ADC / FFT pipeline</text>
  <text x="130" y="334" text-anchor="middle" class="tiny">complex I16Q16</text>

  <path d="M215 260 H260" class="flow"/>

  <rect x="265" y="145" width="190" height="230" rx="6" class="box" fill="#dcfce7"/>
  <text x="360" y="182" text-anchor="middle" class="heading">Range-Doppler block</text>
  <g stroke="#16a34a" stroke-width="1.5" fill="none">
    <rect x="310" y="212" width="100" height="86"/>
    <path d="M330 212 V298 M350 212 V298 M370 212 V298 M390 212 V298"/>
    <path d="M310 229 H410 M310 246 H410 M310 263 H410 M310 280 H410"/>
  </g>
  <rect x="350" y="229" width="20" height="17" fill="#f59e0b"/>
  <rect x="390" y="263" width="20" height="17" fill="#ef4444"/>
  <text x="360" y="327" text-anchor="middle" class="body">1024 samples / block</text>
  <text x="360" y="350" text-anchor="middle" class="tiny">4096 raw bytes</text>

  <path d="M455 260 H500" class="flow"/>

  <rect x="505" y="120" width="235" height="280" rx="6" class="box" fill="#fef3c7"/>
  <text x="622" y="160" text-anchor="middle" class="heading">Lossless RDTC</text>
  <rect x="540" y="188" width="165" height="38" rx="5" fill="#fff" stroke="#d97706"/>
  <text x="622" y="213" text-anchor="middle" class="body">RAW_BYPASS</text>
  <rect x="540" y="238" width="165" height="38" rx="5" fill="#fff" stroke="#d97706"/>
  <text x="622" y="263" text-anchor="middle" class="body">ZERO_RICE</text>
  <rect x="540" y="288" width="165" height="38" rx="5" fill="#fff" stroke="#d97706"/>
  <text x="622" y="313" text-anchor="middle" class="body">DELTA_RICE</text>
  <text x="622" y="354" text-anchor="middle" class="tiny">predict -> map -> k-select -> pack</text>
  <text x="622" y="376" text-anchor="middle" class="tiny">64-byte header + payload</text>

  <path d="M740 260 H785" class="flow"/>

  <rect x="790" y="120" width="255" height="280" rx="6" class="box" fill="#ede9fe"/>
  <text x="917" y="160" text-anchor="middle" class="heading">N x independent Engine</text>
  <g>
    <rect x="825" y="190" width="185" height="44" rx="5" fill="#fff" stroke="#7c3aed"/><text x="917" y="218" text-anchor="middle" class="body">Feeder + Engine 0</text>
    <rect x="825" y="247" width="185" height="44" rx="5" fill="#fff" stroke="#7c3aed"/><text x="917" y="275" text-anchor="middle" class="body">Feeder + Engine 1</text>
    <rect x="825" y="304" width="185" height="44" rx="5" fill="#fff" stroke="#7c3aed"/><text x="917" y="332" text-anchor="middle" class="body">... + packet buffers</text>
  </g>
  <text x="917" y="378" text-anchor="middle" class="tiny">round-robin whole-block dispatch</text>

  <path d="M1045 260 H1090" class="flow"/>

  <rect x="1095" y="145" width="190" height="230" rx="6" class="box" fill="#cffafe"/>
  <text x="1190" y="182" text-anchor="middle" class="heading">Packet-locked AXI</text>
  <rect x="1130" y="214" width="120" height="58" rx="5" fill="#fff" stroke="#0891b2"/>
  <text x="1190" y="238" text-anchor="middle" class="body">Header</text>
  <text x="1190" y="258" text-anchor="middle" class="tiny">Frame / Block ID</text>
  <rect x="1130" y="284" width="120" height="50" rx="5" fill="#fff" stroke="#0891b2"/>
  <text x="1190" y="315" text-anchor="middle" class="body">Payload</text>
  <text x="1190" y="355" text-anchor="middle" class="tiny">no beat interleaving</text>

  <path d="M1285 260 H1325" class="flow"/>

  <rect x="1330" y="145" width="115" height="230" rx="6" class="box" fill="#fee2e2"/>
  <text x="1387" y="182" text-anchor="middle" class="heading">Decoder</text>
  <rect x="1350" y="218" width="75" height="44" rx="5" fill="#fff" stroke="#dc2626"/>
  <text x="1387" y="246" text-anchor="middle" class="body">Parse</text>
  <rect x="1350" y="282" width="75" height="44" rx="5" fill="#fff" stroke="#dc2626"/>
  <text x="1387" y="310" text-anchor="middle" class="body">Restore</text>
  <text x="1387" y="350" text-anchor="middle" class="tiny">I/Q exact</text>

  <rect x="45" y="445" width="1400" height="88" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="72" y="477" class="heading">End-to-end contract</text>
  <text x="72" y="506" class="body">bit-exact I/Q | explicit mode and length | backpressure-safe framing | metadata-preserved identity | packet atomicity</text>
  <text x="1415" y="489" text-anchor="end" class="body">Order may vary across packets.</text>
  <text x="1415" y="514" text-anchor="end" class="tiny">Metadata enables indexed reconstruction; no software reorder PASS claimed.</text>
</svg>
