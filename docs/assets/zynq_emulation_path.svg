<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">AXIS32 XSim and Zynq build maturity layers</title>
  <desc id="desc">Vivado XSim verifies an AXIS32 wrapper with only input s0 driven. Historical Zynq trial evidence is limited to compatibility-copy RTL elaboration and SDK ELF build. Current public RTL direct Vivado 2018.3 elaboration, bitstream, board runtime, timing, and resources are not claimed.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
    <style>.title{font:700 28px Arial,sans-serif;fill:#0f172a}.sub{font:400 14px Arial,sans-serif;fill:#475569}.label{font:700 17px Arial,sans-serif;fill:#0f172a}.small{font:400 13px Arial,sans-serif;fill:#334155}.tiny{font:400 12px Arial,sans-serif;fill:#475569}.box{stroke:#334155;stroke-width:2;rx:6}.arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1400" height="620" fill="#f8fafc"/>
  <text x="55" y="48" class="title">AXIS32 XSim verified; Zynq build maturity separate</text>
  <text x="55" y="75" class="sub">XSim, trial-copy elaboration, SDK build, bitstream, timing, and board execution are distinct evidence layers.</text>

  <rect x="50" y="105" width="920" height="205" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="75" y="138" class="label">Layer A - Vivado 2018.3 XSim: verified 3/3</text>
  <rect x="80" y="170" width="170" height="92" class="box" fill="#dbeafe"/>
  <text x="165" y="202" text-anchor="middle" class="label">Block cases</text>
  <text x="165" y="226" text-anchor="middle" class="small">ZERO / DELTA</text>
  <text x="165" y="248" text-anchor="middle" class="small">mixed two-block</text>
  <path d="M250 216 H300" class="arrow"/>
  <rect x="305" y="155" width="210" height="122" class="box" fill="#fef3c7"/>
  <text x="410" y="190" text-anchor="middle" class="label">AXIS32 wrapper</text>
  <text x="410" y="218" text-anchor="middle" class="small">s0 driven</text>
  <text x="410" y="240" text-anchor="middle" class="small">s1 not concurrent</text>
  <text x="410" y="262" text-anchor="middle" class="tiny">width conversion + stalls</text>
  <path d="M515 216 H565" class="arrow"/>
  <rect x="570" y="155" width="170" height="122" class="box" fill="#fee2e2"/>
  <text x="655" y="190" text-anchor="middle" class="label">RDTC codec</text>
  <text x="655" y="218" text-anchor="middle" class="small">real encoder path</text>
  <text x="655" y="241" text-anchor="middle" class="small">variable packets</text>
  <path d="M740 216 H790" class="arrow"/>
  <rect x="795" y="155" width="145" height="122" class="box" fill="#dcfce7"/>
  <text x="867" y="190" text-anchor="middle" class="label">Golden check</text>
  <text x="867" y="218" text-anchor="middle" class="small">decoder loopback</text>
  <text x="867" y="241" text-anchor="middle" class="small">tkeep / tlast</text>

  <rect x="50" y="335" width="920" height="205" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="75" y="368" class="label">Layer B - historical Zynq-7000 trial copy</text>
  <rect x="80" y="400" width="180" height="95" class="box" fill="#dcfce7"/>
  <text x="170" y="432" text-anchor="middle" class="label">PS + SDK app</text>
  <text x="170" y="458" text-anchor="middle" class="small">SDK / ELF build</text>
  <text x="170" y="480" text-anchor="middle" class="small" fill="#15803d">VERIFIED</text>
  <path d="M260 447 H310" class="arrow"/>
  <rect x="315" y="400" width="180" height="95" class="box" fill="#ede9fe"/>
  <text x="405" y="432" text-anchor="middle" class="label">BD / MCDMA</text>
  <text x="405" y="458" text-anchor="middle" class="small">structural integration</text>
  <text x="405" y="480" text-anchor="middle" class="tiny">runtime not claimed</text>
  <path d="M495 447 H545" class="arrow"/>
  <rect x="550" y="400" width="180" height="95" class="box" fill="#fef3c7"/>
  <text x="640" y="432" text-anchor="middle" class="label">Compat RTL copy</text>
  <text x="640" y="458" text-anchor="middle" class="small">synth_design -rtl</text>
  <text x="640" y="480" text-anchor="middle" class="small" fill="#15803d">VERIFIED</text>
  <path d="M730 447 H780" class="arrow"/>
  <rect x="785" y="400" width="155" height="95" class="box" fill="#f1f5f9"/>
  <text x="862" y="432" text-anchor="middle" class="label">DDR loopback</text>
  <text x="862" y="458" text-anchor="middle" class="small">intended path</text>
  <text x="862" y="480" text-anchor="middle" class="tiny">board PASS not claimed</text>

  <rect x="1010" y="105" width="340" height="435" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="1040" y="145" class="label">Claim boundary</text>
  <circle cx="1048" cy="188" r="8" fill="#16a34a"/><text x="1070" y="193" class="small">AXIS32 XSim 3/3</text>
  <circle cx="1048" cy="225" r="8" fill="#16a34a"/><text x="1070" y="230" class="small">Trial-copy RTL elaboration</text>
  <circle cx="1048" cy="262" r="8" fill="#16a34a"/><text x="1070" y="267" class="small">SDK / ELF build</text>
  <line x1="1040" y1="292" x2="1320" y2="292" stroke="#f59e0b"/>
  <circle cx="1048" cy="330" r="8" fill="#dc2626"/><text x="1070" y="335" class="small">Matching bitstream</text>
  <circle cx="1048" cy="367" r="8" fill="#dc2626"/><text x="1070" y="372" class="small">Board / console PASS</text>
  <circle cx="1048" cy="404" r="8" fill="#dc2626"/><text x="1070" y="409" class="small">MCDMA / DDR runtime</text>
  <circle cx="1048" cy="441" r="8" fill="#dc2626"/><text x="1070" y="446" class="small">FPGA timing closure</text>
  <circle cx="1048" cy="478" r="8" fill="#dc2626"/><text x="1070" y="483" class="small">LUT / FF / BRAM / DSP</text>
  <text x="1040" y="520" class="tiny">Red items are explicitly NOT CLAIMED.</text>
  <text x="55" y="585" class="sub">Dual-Engine scaling is supported by separate RTL regression evidence, not by the single-input AXIS32 XSim testbench.</text>
</svg>
