<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">MRTC-RDTC single-engine pipeline</title>
  <desc id="desc">A configured ZERO or DELTA predictor feeds residual mapping, internal k selection, lane-parallel bit packing, packet buffering, and a bit-exact decoder path. RAW fallback is path-dependent.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
    <style>.title{font:700 28px Arial,sans-serif;fill:#0f172a}.sub{font:400 15px Arial,sans-serif;fill:#475569}.label{font:700 16px Arial,sans-serif;fill:#0f172a}.small{font:400 13px Arial,sans-serif;fill:#334155}.tiny{font:400 12px Arial,sans-serif;fill:#475569}.box{stroke:#334155;stroke-width:2}.arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1400" height="520" fill="#f8fafc"/>
  <text x="45" y="44" class="title">Single-Engine lossless codec pipeline</text>
  <text x="45" y="72" class="sub">Block capture overlaps computation; the packet buffer isolates variable-length output from AXI backpressure.</text>

  <rect x="40" y="130" width="120" height="110" rx="6" class="box" fill="#dbeafe"/>
  <text x="100" y="164" text-anchor="middle" class="label">AXI input</text><text x="100" y="191" text-anchor="middle" class="small">I16Q16</text><text x="100" y="214" text-anchor="middle" class="small">1024 samples</text>
  <path d="M160 185 H195" class="arrow"/>

  <rect x="200" y="115" width="155" height="140" rx="6" class="box" fill="#dcfce7"/>
  <text x="277" y="151" text-anchor="middle" class="label">Ping-pong</text><text x="277" y="174" text-anchor="middle" class="label">block buffer</text>
  <rect x="238" y="195" width="35" height="28" fill="#fff" stroke="#16a34a"/><rect x="285" y="195" width="35" height="28" fill="#fff" stroke="#16a34a"/>
  <text x="277" y="242" text-anchor="middle" class="tiny">capture / compute overlap</text>
  <path d="M355 185 H390" class="arrow"/>

  <rect x="395" y="115" width="165" height="140" rx="6" class="box" fill="#fef3c7"/>
  <text x="477" y="151" text-anchor="middle" class="label">Predictor</text><text x="477" y="176" text-anchor="middle" class="small">configured ZERO / DELTA</text>
  <text x="477" y="207" text-anchor="middle" class="label">Residual map</text><text x="477" y="232" text-anchor="middle" class="small">signed to non-negative</text>
  <path d="M560 185 H595" class="arrow"/>

  <rect x="600" y="115" width="165" height="140" rx="6" class="box" fill="#ede9fe"/>
  <text x="682" y="151" text-anchor="middle" class="label">Prefix cost</text><text x="682" y="176" text-anchor="middle" class="small">candidate k values</text>
  <text x="682" y="207" text-anchor="middle" class="label">Internal k-select</text><text x="682" y="232" text-anchor="middle" class="small">block-level minimum</text>
  <path d="M765 185 H800" class="arrow"/>

  <rect x="805" y="100" width="180" height="170" rx="6" class="box" fill="#fee2e2"/>
  <text x="895" y="140" text-anchor="middle" class="label">Lane-parallel</text><text x="895" y="163" text-anchor="middle" class="label">bitpacker</text>
  <text x="895" y="194" text-anchor="middle" class="small">Rice payload</text><line x1="835" y1="211" x2="955" y2="211" stroke="#dc2626"/>
  <text x="895" y="239" text-anchor="middle" class="small">64-byte header</text>
  <path d="M985 185 H1020" class="arrow"/>

  <rect x="1025" y="115" width="155" height="140" rx="6" class="box" fill="#cffafe"/>
  <text x="1102" y="151" text-anchor="middle" class="label">Packet buffer</text><text x="1102" y="181" text-anchor="middle" class="small">variable length</text><text x="1102" y="207" text-anchor="middle" class="small">stall isolation</text>
  <path d="M1180 185 H1215" class="arrow"/>

  <rect x="1220" y="130" width="140" height="110" rx="6" class="box" fill="#dbeafe"/>
  <text x="1290" y="164" text-anchor="middle" class="label">AXI output</text><text x="1290" y="191" text-anchor="middle" class="small">128-bit beats</text><text x="1290" y="214" text-anchor="middle" class="small">tkeep / tlast</text>

  <path d="M277 255 V310 H895 V270" stroke="#d97706" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="600" y="300" text-anchor="middle" class="small" fill="#92400e">RAW fallback only on supporting encoder paths</text>

  <rect x="200" y="360" width="1160" height="115" rx="6" fill="#fff" stroke="#64748b" stroke-width="2"/>
  <text x="225" y="394" class="label">Decoder loopback</text>
  <rect x="405" y="382" width="150" height="55" rx="5" fill="#f1f5f9" stroke="#64748b"/><text x="480" y="415" text-anchor="middle" class="small">Header parser</text>
  <path d="M555 410 H605" class="arrow"/>
  <rect x="610" y="382" width="180" height="55" rx="5" fill="#f1f5f9" stroke="#64748b"/><text x="700" y="404" text-anchor="middle" class="small">Rice / RAW decode</text><text x="700" y="424" text-anchor="middle" class="tiny">residual unmap</text>
  <path d="M790 410 H840" class="arrow"/>
  <rect x="845" y="382" width="190" height="55" rx="5" fill="#f1f5f9" stroke="#64748b"/><text x="940" y="404" text-anchor="middle" class="small">I/Q reconstruction</text><text x="940" y="424" text-anchor="middle" class="tiny">bit-exact comparison</text>
  <rect x="1070" y="382" width="250" height="55" rx="5" fill="#f8fafc" stroke="#94a3b8"/><text x="1195" y="404" text-anchor="middle" class="small">Backpressure may pause transfer</text><text x="1195" y="424" text-anchor="middle" class="tiny">packet content and boundaries stay stable</text>
  <text x="225" y="457" class="tiny">Payload-bit count excludes padding in the final AXI beat; malformed headers and lengths fail closed.</text>
</svg>
