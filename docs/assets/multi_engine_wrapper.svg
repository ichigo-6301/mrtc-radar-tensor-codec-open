<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="700" viewBox="0 0 1500 700" role="img" aria-labelledby="title desc">
  <title id="title">MRTC-RDTC Multi-Engine wrapper</title>
  <desc id="desc">A round-robin dispatcher sends blocks to independent feeders, RDTC engines, and packet buffers. A packet-locked arbiter emits atomic packets with metadata for indexed software reconstruction.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
    <style>.title{font:700 29px Arial,sans-serif;fill:#0f172a}.sub{font:400 15px Arial,sans-serif;fill:#475569}.label{font:700 17px Arial,sans-serif;fill:#0f172a}.small{font:400 13px Arial,sans-serif;fill:#334155}.tiny{font:400 12px Arial,sans-serif;fill:#475569}.box{stroke:#334155;stroke-width:2;rx:6}.arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.lane{stroke:#94a3b8;stroke-width:1.5;fill:#fff;rx:6}</style>
  </defs>
  <rect width="1500" height="700" fill="#f8fafc"/>
  <text x="55" y="48" class="title">Parameterized Multi-Engine wrapper</text>
  <text x="55" y="76" class="sub">Parallel block processing with independent state and packet-atomic output arbitration.</text>

  <rect x="50" y="255" width="145" height="120" class="box" fill="#dbeafe"/>
  <text x="122" y="292" text-anchor="middle" class="label">Input blocks</text>
  <text x="122" y="320" text-anchor="middle" class="small">AXI / DDR feeder</text>
  <text x="122" y="344" text-anchor="middle" class="small">Frame + Block ID</text>
  <path d="M195 315 H245" class="arrow"/>

  <rect x="250" y="225" width="170" height="180" class="box" fill="#dcfce7"/>
  <text x="335" y="270" text-anchor="middle" class="label">Round-Robin</text>
  <text x="335" y="294" text-anchor="middle" class="label">dispatcher</text>
  <text x="335" y="329" text-anchor="middle" class="small">assign whole blocks</text>
  <text x="335" y="352" text-anchor="middle" class="small">to available Engines</text>
  <text x="335" y="382" text-anchor="middle" class="tiny">No shared codec state</text>

  <path d="M420 255 H450 V162 H480" class="arrow"/>
  <path d="M420 295 H460 V282 H480" class="arrow"/>
  <path d="M420 335 H470 V402 H480" class="arrow"/>
  <path d="M420 375 H440 V522 H480" class="arrow"/>

  <g>
    <rect x="485" y="110" width="620" height="105" class="lane"/>
    <rect x="505" y="128" width="135" height="68" rx="5" fill="#fef3c7" stroke="#d97706"/>
    <text x="572" y="157" text-anchor="middle" class="label">Feeder 0</text><text x="572" y="180" text-anchor="middle" class="small">block-local input</text>
    <path d="M640 162 H685" class="arrow"/>
    <rect x="690" y="128" width="170" height="68" rx="5" fill="#fee2e2" stroke="#dc2626"/>
    <text x="775" y="157" text-anchor="middle" class="label">RDTC Engine 0</text><text x="775" y="180" text-anchor="middle" class="small">data-dependent latency</text>
    <path d="M860 162 H905" class="arrow"/>
    <rect x="910" y="128" width="170" height="68" rx="5" fill="#cffafe" stroke="#0891b2"/>
    <text x="995" y="157" text-anchor="middle" class="label">Packet buffer 0</text><text x="995" y="180" text-anchor="middle" class="small">complete packet</text>

    <rect x="485" y="230" width="620" height="105" class="lane"/>
    <rect x="505" y="248" width="135" height="68" rx="5" fill="#fef3c7" stroke="#d97706"/>
    <text x="572" y="277" text-anchor="middle" class="label">Feeder 1</text><text x="572" y="300" text-anchor="middle" class="small">block-local input</text>
    <path d="M640 282 H685" class="arrow"/>
    <rect x="690" y="248" width="170" height="68" rx="5" fill="#fee2e2" stroke="#dc2626"/>
    <text x="775" y="277" text-anchor="middle" class="label">RDTC Engine 1</text><text x="775" y="300" text-anchor="middle" class="small">data-dependent latency</text>
    <path d="M860 282 H905" class="arrow"/>
    <rect x="910" y="248" width="170" height="68" rx="5" fill="#cffafe" stroke="#0891b2"/>
    <text x="995" y="277" text-anchor="middle" class="label">Packet buffer 1</text><text x="995" y="300" text-anchor="middle" class="small">complete packet</text>

    <rect x="485" y="350" width="620" height="105" class="lane"/>
    <rect x="505" y="368" width="135" height="68" rx="5" fill="#fef3c7" stroke="#d97706"/>
    <text x="572" y="397" text-anchor="middle" class="label">Feeder 2</text><text x="572" y="420" text-anchor="middle" class="small">block-local input</text>
    <path d="M640 402 H685" class="arrow"/>
    <rect x="690" y="368" width="170" height="68" rx="5" fill="#fee2e2" stroke="#dc2626"/>
    <text x="775" y="397" text-anchor="middle" class="label">RDTC Engine 2</text><text x="775" y="420" text-anchor="middle" class="small">data-dependent latency</text>
    <path d="M860 402 H905" class="arrow"/>
    <rect x="910" y="368" width="170" height="68" rx="5" fill="#cffafe" stroke="#0891b2"/>
    <text x="995" y="397" text-anchor="middle" class="label">Packet buffer 2</text><text x="995" y="420" text-anchor="middle" class="small">complete packet</text>

    <rect x="485" y="470" width="620" height="105" class="lane"/>
    <rect x="505" y="488" width="135" height="68" rx="5" fill="#fef3c7" stroke="#d97706"/>
    <text x="572" y="517" text-anchor="middle" class="label">Feeder 3</text><text x="572" y="540" text-anchor="middle" class="small">block-local input</text>
    <path d="M640 522 H685" class="arrow"/>
    <rect x="690" y="488" width="170" height="68" rx="5" fill="#fee2e2" stroke="#dc2626"/>
    <text x="775" y="517" text-anchor="middle" class="label">RDTC Engine 3</text><text x="775" y="540" text-anchor="middle" class="small">data-dependent latency</text>
    <path d="M860 522 H905" class="arrow"/>
    <rect x="910" y="488" width="170" height="68" rx="5" fill="#cffafe" stroke="#0891b2"/>
    <text x="995" y="517" text-anchor="middle" class="label">Packet buffer 3</text><text x="995" y="540" text-anchor="middle" class="small">complete packet</text>
  </g>

  <path d="M1080 162 H1145 V280" class="arrow"/>
  <path d="M1080 282 H1145" class="arrow"/>
  <path d="M1080 402 H1145 V320" class="arrow"/>
  <path d="M1080 522 H1145 V340" class="arrow"/>
  <rect x="1150" y="225" width="175" height="180" class="box" fill="#ede9fe"/>
  <text x="1237" y="266" text-anchor="middle" class="label">Packet-locked</text>
  <text x="1237" y="290" text-anchor="middle" class="label">arbiter</text>
  <text x="1237" y="326" text-anchor="middle" class="small">lock until tlast</text>
  <text x="1237" y="351" text-anchor="middle" class="small">no beat interleaving</text>
  <text x="1237" y="380" text-anchor="middle" class="tiny">completion order may vary</text>
  <path d="M1325 315 H1375" class="arrow"/>
  <rect x="1380" y="255" width="90" height="120" class="box" fill="#dbeafe"/>
  <text x="1425" y="292" text-anchor="middle" class="label">AXI out</text>
  <text x="1425" y="321" text-anchor="middle" class="small">atomic</text>
  <text x="1425" y="343" text-anchor="middle" class="small">packets</text>

  <path d="M1425 375 V620 H1060" class="arrow"/>
  <rect x="705" y="605" width="350" height="58" class="box" fill="#ffffff"/>
  <text x="880" y="630" text-anchor="middle" class="label">Indexed software reconstruction</text>
  <text x="880" y="651" text-anchor="middle" class="small">Frame / Block metadata preserves identity</text>
  <rect x="50" y="605" width="600" height="58" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="70" y="630" class="label">Ordering contract</text>
  <text x="220" y="630" class="small">packet atomic | order not guaranteed | no software reorder PASS claimed</text>
</svg>
