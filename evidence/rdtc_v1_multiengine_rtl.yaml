caveats:
  - Published performance values remain historical fixed-commit measurements; the adapted public RTL smoke does not recompute the 256-block 1/2/4-Engine matrix.
  - Beam/s values use unrounded estimated_cycles_per_beam values for a 256-block beam and an assumed 200 MHz arithmetic projection; they are not FPGA timing measurements.
  - The architecture permits finite packet-level out-of-order completion, but the recorded rows happened to retain ascending block IDs.
  - Header metadata enables indexed software reassembly; a completed software reorder program is not claimed.
