  changes:
    - Icarus-compatible testbench parsing and bounded capture storage
    - Packet-buffer forward-progress, overflow-stickiness, and metadata-count correctness fixes
    - Outstanding DDR-response beats are reserved before admitting another feeder burst
    - Capture slots replay in allocation order and status clearing does not pause datapath handshakes
    - Status clearing has priority over same-cycle feeder, packet-buffer, and wrapper counter updates while datapath state still advances
    - An overlength packet is tested as a reset-only fail-stop instead of a recoverable counter clear
    - Explicit assertion that every configured Engine participates in the public smoke
    - Explicit negative smoke that OUTPUT_IN_ORDER=1 fails fast
