name: Public preflight

on:
  push:
    branches: [main]
    tags: [rdtc-v1-register550-rc3]
  pull_request:
  workflow_dispatch:

env:
  RELEASE_REF: rdtc-v1-register550-rc3

permissions:
  contents: read

jobs:
  release-integrity:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements-public.txt
      - name: Validate current main profiles
        run: python flows/scripts/validate_profile.py --all-defconfigs
      - name: Check current main checksums
        run: python provenance/generate_checksums.py --ref HEAD --check
      - name: Run current main unit tests
        run: python -m unittest flows/scripts/test_flowctl_primetime.py flows/scripts/test_validate_profile.py provenance/test_verify_release.py -v
      - name: Scan current main public tree
        run: python flows/scripts/scan_public_release.py --ref HEAD
      - name: Checkout immutable release
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          path: release-check
          fetch-depth: 0
          fetch-tags: true
      - name: Restore immutable annotated tag
        working-directory: release-check
        run: python provenance/restore_release_tag.py ${{ env.RELEASE_REF }}
      - name: Check immutable release checksums
        working-directory: release-check
        run: python provenance/generate_checksums.py --ref HEAD --check
      - name: Verify immutable release
        working-directory: release-check
        run: python provenance/verify_release.py --ref ${{ env.RELEASE_REF }}

  public-functional-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned RTL simulation toolchain
        uses: YosysHQ/setup-oss-cad-suite@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: "2026-07-19"
      - run: python -m pip install -r requirements-public.txt
      - run: sudo apt-get update && sudo apt-get install -y gcc make
      - run: make rdtc_v1_public_preflight_defconfig
      - run: make showconfig
      - run: make -C ref_model/c test
      - run: make rtl-smoke
      - run: make multiengine-smoke
      - run: make fpga-wrapper-smoke
      - run: make showcase-assets-check
      - run: python -m unittest flows/scripts/test_flowctl_primetime.py flows/scripts/test_validate_profile.py provenance/test_verify_release.py -v
      - run: git diff --exit-code

  documentation-and-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python flows/scripts/check_public_docs.py
      - run: python flows/scripts/scan_public_release.py --ref HEAD
