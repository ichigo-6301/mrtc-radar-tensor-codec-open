kind: claims
schema_version: 1.0.0
claims:
  - id: rdtc_v1_reference_bit_exact
    profile: rdtc_v1_public_release
    statement: "RDTC v1 MATLAB vectors, the C/DPI-C reference model, and the published RTL legal-vector regressions agree for RAW_BYPASS, ZERO_RICE, and DELTA_RICE."
    metric: bit_exact_equivalence
    value: pass
    unit: result
    benchmark: published RDTC v1 legal-vector set
    configuration: I16Q16 BLOCK_MODE_A stream packets including multi-block and AXI packing vectors
    source_ref: bf27b88d77c422ed385e35bb2f19335e054af244
    tool: "MATLAB R2024b, gcc/make, and Questa"
    evidence:
      - rdtc_v1_reference_validation_public
    status: verified
    caveat: Applies to the documented legal-vector and regression set; it is not an exhaustive formal proof.
    public: true
  - id: rdtc_v1_register_expanded_nangate15_800m_dc
    profile: rdtc_v1_register_expanded
    statement: The register-expanded RDTC wrapper met the internal 800 MHz Design Compiler constraint in the published NanGate15 comparison profile.
    metric: setup_wns
    value: 0.22945
    unit: ns
    benchmark: NanGate15 register-expanded DC matrix
    configuration: "TT/0.8 V/25 C, 1 ps Liberty time unit, 100 ps setup uncertainty"
    source_ref: 41b33f7
    tool: dc_shell O-2018.06-SP1
    evidence:
      - rdtc_v1_register_expanded_public
    status: verified
    caveat: "Open-source NLDM and Library Compiler warnings; internal DC estimate only, with no P&R, IO, or foundry signoff claim."
    public: true
  - id: rdtc_v1_register_ics55_rvt_800m_dc
    profile: rdtc_v1_register_ics55_rvt_dc
    statement: The register-expanded RDTC wrapper met the internal 800 MHz Design Compiler constraint with the reviewed ICS55 RVT public-preview library.
    metric: setup_wns
    value: 0.00
    unit: ns
    benchmark: ICS55 RVT register-expanded DC matrix
    configuration: "ICsprout55 v1.10.100 H7CR RVT, TT/1.2 V/25 C, 100 ps setup uncertainty"
    source_ref: 41b33f7057c341cc4b952f51b00eb886f42c5fe2
    tool: Synopsys Design Compiler O-2018.06-SP1
    evidence:
      - rdtc_v1_register_ics55_rvt_dc_public
    status: verified
    caveat: "Internal ideal-clock DC estimate only; no P&R, route parasitics, complete IO timing, reset recovery/removal, OCV/MMMC, foundry signoff, production-readiness, or silicon claim."
    public: true
  - id: rdtc_v1_register_expanded_nangate45_pnr400_pt
    profile: rdtc_v1_register_expanded
    statement: The register-expanded RDTC wrapper completed the documented 45 nm academic OpenROAD/OpenRCX flow and passed the matching 400 MHz PrimeTime internal setup and hold checks.
    metric: setup_wns
    value: 0.8
    unit: ns
    benchmark: "Nangate45 register-expanded P&R/PT candidate"
    configuration: "600 MHz DC-mapped netlist, 400 MHz physical target, 60% capacitance and 65% slew repair guardbands"
    source_ref: 41b33f7
    tool: OpenROAD ORFS and PrimeTime O-2018.06-SP1
    evidence:
      - rdtc_v1_register_expanded_public
    status: verified
    caveat: "Internal reg-to-reg academic timing only; no IO closure, OCV/MMMC, foundry signoff, DRC/LVS, or silicon claim."
    public: true
  - id: rdtc_v1_register_expanded_nangate45_pnr550_pt
    profile: rdtc_v1_register_expanded
    statement: The register-expanded RDTC wrapper completed the documented 45 nm academic OpenROAD/OpenRCX flow and passed the matching 550 MHz PrimeTime internal setup and hold checks.
    metric: setup_wns
    value: 0.26
    unit: ns
    benchmark: "Nangate45 register-expanded P&R/PT candidate"
    configuration: "700 MHz DC-mapped netlist, 550 MHz physical target, 60% capacitance and 65% slew repair guardbands"
    source_ref: 41b33f7
    tool: "OpenROAD ORFS, OpenRCX, and PrimeTime O-2018.06-SP1"
    evidence:
      - rdtc_v1_register_expanded_public
    status: verified
    caveat: "Internal reg-to-reg academic timing only; asynchronous reset and top-level IO max-delay coverage, OCV/MMMC, foundry signoff, foundry DRC/LVS, and silicon are not claimed."
    public: true
  - id: rdtc_v1_sram_macro_nangate45_333m_pt
    profile: rdtc_v1_sram_macro
    statement: The SRAM-macro RDTC wrapper completed verified chip-level 45 nm academic OpenROAD P&R, same-run OpenRCX SPEF, and matching 333 MHz PrimeTime internal setup and hold checks.
    metric: setup_wns
    value: 0.57
    unit: ns
    benchmark: Nangate45 SRAM-macro post-route STA candidate
    configuration: "two 64x128 1RW1R OpenRAM macros, 3.000 ns physical clock, same-run SPEF"
    source_ref: b3ac1bb
    tool: "OpenROAD ORFS, OpenRCX, and PrimeTime O-2018.06-SP1"
    evidence:
      - rdtc_v1_sram_macro_333m_public
    status: verified
    caveat: "Internal reg-to-reg academic timing only. OpenRAM characterization is analytical, and this learning/engineering project makes no production-PDK, macro DRC/LVS/PEX, complete IO, OCV/MMMC, foundry-signoff, or silicon claim; the reviewed exact-set minimum-capacitance waiver covers 256 unused dout0 endpoints only."
    public: true
  - id: rdtc_v1_wb_wrapper_vcs_regression
    profile: rdtc_v1_public_release
    statement: The frozen dual-AXIS128 RDTC writeback-wrapper VCS regression passed its required cases.
    metric: required_case_count
    value: 10
    unit: cases
    benchmark: frozen dual-AXIS128 wrapper VCS suite
    configuration: 4096-byte raw blocks with independent lane backpressure and completion handling
    source_ref: bf27b88d77c422ed385e35bb2f19335e054af244
    tool: vcs O-2018.09-SP2
    evidence:
      - rdtc_v1_wb_wrapper_vcs_public
    status: verified
    caveat: "This is a finite wrapper regression result, not formal verification or coverage closure."
    public: true
  - id: rdtc_v1_matlab_lossless_synthetic_snr
    profile: rdtc_v1_public_release
    statement: "In the published synthetic MATLAB SNR sweep, ZERO_RICE and DELTA_RICE each reconstructed all six selected cases exactly, with zero NMSE/max-absolute error and point-cloud match ratio 1."
    metric: synthetic_lossless_case_count
    value: 12
    unit: cases
    benchmark: synthetic Range-Doppler-beam scenes from -20 dB through 30 dB SNR
    configuration: six SNR points for each of ZERO_RICE and DELTA_RICE
    source_ref: bf27b88d77c422ed385e35bb2f19335e054af244
    tool: MATLAB R2024b
    evidence:
      - rdtc_v1_matlab_algorithm_study_public
    status: verified
    caveat: "Synthetic MATLAB study only; it is not measured-radar evidence and does not claim PointCloud RTL."
    public: true
  - id: rdtc_v1_multiengine_rtl_scaling
    profile: rdtc_v1_public_release
    statement: "For the fixed 256-block prefix RTL workload, the 1/2/4-engine configurations measured 785.00/397.52/197.41 effective cycles per block, with 2/4-engine scaling efficiencies of 0.987368/0.994115."
    metric: four_engine_effective_cycles_per_block
    value: 197.41
    unit: cycles_per_block
    benchmark: fixed 256-block prefix multi-engine RTL workload
    configuration: per-engine DDR feeder, encoder, and two-entry output packet buffer
    source_ref: 8628ee4d561bf4ee4a97a02c800e1c52c9e9a28a
    tool: fixed-commit Questa/ModelSim RTL regression
    evidence:
      - rdtc_v1_multiengine_rtl_public
    status: verified
    caveat: "One beam is the recorded 256-block workload. The 995.2229/1965.3022/3957.4642 beam/s figures use unrounded estimated_cycles_per_beam values and are arithmetic projections at an assumed 200 MHz, not FPGA timing or measured board throughput."
    public: true
  - id: rdtc_v1_multiengine_packet_atomicity
    profile: rdtc_v1_public_release
    statement: "The fixed 2/4-engine 256-block regressions completed every packet with byte-exact payload, matching selected-k and compression ratio, and no beat interleaving."
    metric: packet_integrity
    value: pass
    unit: result
    benchmark: fixed 256-block prefix multi-engine RTL workload
    configuration: packet-level locked arbitration with OUT_OF_ORDER completion mode
    source_ref: 8628ee4d561bf4ee4a97a02c800e1c52c9e9a28a
    tool: fixed-commit Questa/ModelSim RTL regression
    evidence:
      - rdtc_v1_multiengine_rtl_public
    status: verified
    caveat: "Packet metadata supports indexed software reassembly, but a software reorder implementation and an observed reordering event are not claimed."
    public: true
  - id: rdtc_v1_fpga_axis32_emulation
    profile: rdtc_v1_public_release
    statement: "FPGA emulation verified: Vivado Simulator 2018.3 passed three AXIS32 wrapper cases covering width conversion, variable-length packets, tkeep/tlast, input gaps, output backpressure, and decoder golden comparison."
    metric: fpga_emulation_case_count
    value: 3
    unit: cases
    benchmark: historical AXIS32 wrapper Vivado simulation suite
    configuration: single active external AXIS32 input feeding input 0 of the internal two-input wrapper
    source_ref: 43deb9fd99ce5d1b96578dd70fe5f1ddbf3a3bfb
    tool: Vivado Simulator 2018.3
    evidence:
      - rdtc_v1_fpga_axis32_emulation_public
    status: verified
    caveat: "This does not claim concurrent dual-input FPGA verification, synthesis, implementation, timing/resources, a bitstream, MCDMA/DDR runtime, board execution, or an actual FPGA 200 MHz result."
    public: true
  - id: rdtc_v1_zynq_trial_build
    profile: rdtc_v1_public_release
    statement: "The historical Zynq-7000 trial copy completed Vivado 2018.3 RTL elaboration with a compatibility-modified copied RTL set and completed its SDK/ELF application build."
    metric: zynq_trial_copy_build_layers
    value: pass
    unit: result
    benchmark: historical Zynq-7000 AXIS32 MRTC trial-copy build
    configuration: Vivado-2018.3-compatible copied RTL plus SDK application; no bitstream generation or board execution
    source_ref: 43deb9fd99ce5d1b96578dd70fe5f1ddbf3a3bfb
    tool: Vivado 2018.3 and Vivado SDK 2018.3
    evidence:
      - rdtc_v1_zynq_trial_build_public
    status: verified
    caveat: "The current public RTL retains parameter string declarations and is not claimed to elaborate directly in Vivado 2018.3; the trial build also does not prove a matching bitstream, MCDMA/DDR runtime, board-console PASS, FPGA timing, or resource closure."
    public: true
